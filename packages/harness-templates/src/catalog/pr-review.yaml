# title: PR review summary
# description: Reads an open PR's diff, runs an LLM review, and posts the summary as a comment.
# tags: github, llm, review

name: 'pr-review'
version: 1
description: '오픈된 PR 의 diff 를 읽고 LLM 으로 리뷰 요약 → 코멘트'

inputs:
  - name: pullNumber
    type: number
    required: true

defaults:
  llm:
    provider: 'ollama-local'
    model: 'qwen2.5-coder:14b'

rules:
  permissions:
    fs:
      allow: ['**']
      deny: ['.env*', '**/secrets/**']
    process:
      allow: ['git']
  policies:
    - '리뷰는 객관적이고 구체적인 라인 단위 코멘트로 작성'

steps:
  - id: diff
    type: tool
    use: git.diff
    with:
      ref: 'origin/main..HEAD'

  - id: review
    type: llm
    prompt: |
      다음 diff 를 리뷰해 주세요. 잠재적 버그 / 누락된 테스트 / 가독성 문제만 짚으세요.
      코멘트는 한국어로, 라인별로 짧게.
      ---
      ${steps.diff.stdout}
    output: text

  - id: comment
    type: tool
    use: github.comment
    with:
      pullNumber: '${inputs.pullNumber}'
      body: |
        ## 자동 PR 리뷰 요약

        ${steps.review.output}

        ---
        _generated by DevGarden harness `pr-review`_
