name: devgarden-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: devgarden-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devgarden}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devgarden}
      POSTGRES_DB: ${POSTGRES_DB:-devgarden}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devgarden} -d ${POSTGRES_DB:-devgarden}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: devgarden_postgres_dev_data
