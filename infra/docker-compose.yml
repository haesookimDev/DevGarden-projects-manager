name: devgarden

services:
  postgres:
    image: postgres:16-alpine
    container_name: devgarden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: devgarden-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      OWNER_GITHUB_LOGINS: ${OWNER_GITHUB_LOGINS}
    ports:
      - '${API_PORT:-3001}:3001'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/healthz']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: devgarden-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_INTERNAL_URL: http://api:3001
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GITHUB_ID: ${GITHUB_OAUTH_CLIENT_ID}
      AUTH_GITHUB_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      OWNER_GITHUB_LOGINS: ${OWNER_GITHUB_LOGINS}
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  postgres_data:
    name: devgarden_postgres_data
